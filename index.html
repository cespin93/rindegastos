<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rindegastos</title>
  <base href="/rindegastos/">
  <link rel="stylesheet" href="styles.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- LOADING -->
<div id="loading" class="hidden">
  <div class="loading-box">
    <div class="spinner"></div>
    <span style="font-size:14px;color:#374151">Cargando...</span>
  </div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-icon">💼</div>
    <h1 class="login-title">Rindegastos</h1>
    <p class="login-sub">Sistema de Rendición de Gastos Empresarial</p>
    <button class="btn-google" onclick="signIn()">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.3 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-9 20-20 0-1.3-.2-2.7-.4-4z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 19 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.3 26.8 36 24 36c-5.2 0-9.6-3.5-11.2-8.2l-6.5 5C9.8 39.8 16.3 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.2-2.2 4-4 5.4l6.2 5.2C41.4 35.2 44 30 44 24c0-1.3-.2-2.7-.4-4z"/>
      </svg>
      Iniciar sesión con Google
    </button>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="hidden">

  <!-- SIDEBAR -->
  <aside>
    <div class="sidebar-logo">💼 Rindegastos</div>
    <nav>
      <button class="nav-btn" data-view="view-dashboard" onclick="navDashboard()">
        📊 Dashboard
      </button>
      <button class="nav-btn" data-view="view-new-expense" onclick="navNewExpense()">
        ➕ Nueva Rendición
      </button>
      <button class="nav-btn" data-role="APROBADOR,GERENTE,ADMIN" data-view="view-approvals" onclick="navApprovals()">
        ✅ Aprobaciones
        <span id="nav-approvals-count" style="margin-left:auto;font-size:11px;background:rgba(255,255,255,.2);padding:1px 7px;border-radius:10px"></span>
      </button>
      <button class="nav-btn" data-role="GERENTE,ADMIN" data-view="view-gerencia" onclick="navGerencia()">
        🏛 Gerencia
        <span id="nav-gerencia-count" style="margin-left:auto;font-size:11px;background:rgba(255,255,255,.2);padding:1px 7px;border-radius:10px"></span>
      </button>
      <button class="nav-btn" data-role="ADMIN" data-view="view-contabilidad" onclick="navContabilidad()">
        🧾 Contabilidad
      </button>
      <button class="nav-btn" data-role="ADMIN" data-view="view-admin" onclick="navAdmin()">
        ⚙️ Administración
      </button>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-user-row">
        <img id="user-avatar" src="" alt="">
        <div style="overflow:hidden">
          <div id="user-name"></div>
          <div id="user-email"></div>
        </div>
      </div>
      <button class="btn-signout" onclick="signOut()">Cerrar sesión</button>
    </div>
  </aside>

  <!-- VISTAS -->
  <main id="main-content"></main>

</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
